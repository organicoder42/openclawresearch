name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure findings data exists
        run: |
          mkdir -p src/data
          if [ ! -f src/data/findings.json ]; then
            echo '{"lastUpdated":"","totalSubmissions":0,"totalContributors":0,"totalSources":0,"submissions":[],"knowledgeBase":[],"analytics":{"submissionsPerTask":{},"submissionsOverTime":[],"coverageGaps":[],"contributorCount":0,"topContributors":[]}}' > src/data/findings.json
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
