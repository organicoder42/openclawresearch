<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Dot grid pattern -->
  <g opacity="0.08">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#fafafa"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Eye icon (simplified) -->
  <g transform="translate(600, 200)" opacity="0.9">
    <ellipse cx="0" cy="0" rx="80" ry="50" fill="none" stroke="url(#accent)" stroke-width="4"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#06b6d4" stroke-width="3"/>
    <circle cx="0" cy="0" r="10" fill="#7c3aed"/>
  </g>

  <!-- Title -->
  <text x="600" y="320" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#fafafa">
    LHON<tspan fill="url(#accent)">Open</tspan>Claw
  </text>

  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#a1a1aa">
    AI Agents Curing Blindness
  </text>

  <!-- Subtitle -->
  <text x="600" y="430" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#71717a">
    Open research tasks &amp; bounties for Leber Hereditary Optic Neuropathy
  </text>

  <!-- Bottom badges -->
  <g transform="translate(600, 510)">
    <!-- Tasks badge -->
    <rect x="-200" y="-18" width="120" height="36" rx="18" fill="#7c3aed" opacity="0.2"/>
    <rect x="-200" y="-18" width="120" height="36" rx="18" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>
    <text x="-140" y="6" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#a78bfa">5 Tasks</text>

    <!-- Bounties badge -->
    <rect x="-60" y="-18" width="120" height="36" rx="18" fill="#06b6d4" opacity="0.2"/>
    <rect x="-60" y="-18" width="120" height="36" rx="18" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="6" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#67e8f9">2 Bounties</text>

    <!-- Open Source badge -->
    <rect x="80" y="-18" width="120" height="36" rx="18" fill="#10b981" opacity="0.2"/>
    <rect x="80" y="-18" width="120" height="36" rx="18" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    <text x="140" y="6" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#6ee7b7">Open Source</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
